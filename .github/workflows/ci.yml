name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # trellis's own quality gates — blocking. The map machinery must be correct.
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - name: manifest is in sync with the VerbSpec source
        run: |
          deno task gen
          git diff --exit-code specs/keeper-wire.json
      - run: deno task check
      - run: deno lint
      - run: deno fmt --check
      - run: deno task test

  # The aggregating contract check — the "large flake derivation". Report-only
  # for now: it is EXPECTED to fail until the keeper-wire drift it surfaces is
  # fixed upstream (door-kit's import-and-push sends `ledgerRef`, not the
  # `manifestDigest` keeperd reads). Flip `continue-on-error` off — making it a
  # blocking gate — once the upstream fix lands and the inputs are re-pinned.
  contract-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
      - uses: DeterminateSystems/flakehub-cache-action@4d48cd3cda2f381a3006ff800e1c1ca0c9809159 # v3.21.1
      - name: nix flake check (contract conformance)
        # --keep-going so every contract edge reports its finding, not just the
        # first to fail — this tool exists to surface ALL drift at once.
        run: nix flake check --print-build-logs --keep-going
